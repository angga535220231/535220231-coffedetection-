<article class="rounded-3xl border border-espresso/10 bg-white p-4 shadow-sm sm:p-5 lg:col-span-7 lg:p-6">
  <div class="flex items-start justify-between gap-3">
    <div>
      <h2 class="text-lg font-bold sm:text-xl">Input Data Inferensi</h2>
      <p class="mt-1 text-sm text-espresso/65">Unggah citra biji kopi dan isi pembacaan sensor MQ sesuai data training multimodal.</p>
    </div>
  </div>

  <form id="predictForm" class="mt-5 space-y-5">
    <div class="rounded-2xl border border-dashed border-espresso/25 bg-sand/60 p-4">
      <label class="block">
        <span class="mb-2 block text-sm font-semibold">Foto Biji Kopi (JPG/PNG)</span>
        <input
          id="image"
          name="image"
          type="file"
          accept=".jpg,.jpeg,.png"
          class="w-full rounded-xl border border-espresso/20 bg-white px-3 py-2 text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-espresso file:px-3 file:py-2 file:text-sm file:font-semibold file:text-white hover:file:bg-chestnut"
          required
        />
      </label>
      <div class="mt-4 overflow-hidden rounded-xl border border-espresso/10 bg-white">
        <div id="imagePlaceholder" class="flex h-44 w-full items-center justify-center px-3 text-center text-sm font-medium text-espresso/45 sm:h-48">
          Belum ada gambar dipilih.
        </div>
        <img id="imagePreview" alt="Preview biji kopi" class="hidden h-44 w-full object-cover sm:h-48" />
      </div>
    </div>

    <div class="grid gap-3 md:grid-cols-3">
      <label class="rounded-2xl border border-espresso/12 bg-white p-3">
        <span class="mb-2 block text-xs font-bold uppercase tracking-wide text-espresso/60">Sensor MQ-135</span>
        <input id="mq135" name="mq135" type="number" min="0" value="295" class="w-full rounded-xl border border-espresso/20 px-3 py-2 font-semibold" required />
      </label>
      <label class="rounded-2xl border border-espresso/12 bg-white p-3">
        <span class="mb-2 block text-xs font-bold uppercase tracking-wide text-espresso/60">Sensor MQ-2</span>
        <input id="mq2" name="mq2" type="number" min="0" value="272" class="w-full rounded-xl border border-espresso/20 px-3 py-2 font-semibold" required />
      </label>
      <label class="rounded-2xl border border-espresso/12 bg-white p-3">
        <span class="mb-2 block text-xs font-bold uppercase tracking-wide text-espresso/60">Sensor MQ-3</span>
        <input id="mq3" name="mq3" type="number" min="0" value="3563" class="w-full rounded-xl border border-espresso/20 px-3 py-2 font-semibold" required />
      </label>
    </div>

    <div class="flex flex-col items-stretch gap-3 sm:flex-row sm:flex-wrap sm:items-center">
      <button id="submitBtn" type="submit" class="w-full rounded-xl bg-caramel px-5 py-3 text-sm font-bold text-white transition hover:-translate-y-0.5 hover:bg-chestnut sm:w-auto">
        Jalankan Inferensi
      </button>
      <p id="lastRun" class="break-words text-xs font-medium text-espresso/55">Belum ada inferensi terbaru.</p>
    </div>
  </form>

  <div id="statusBox" class="mt-4 hidden rounded-xl border border-moss/35 bg-moss/10 p-3 text-sm font-medium text-moss"></div>
</article>
