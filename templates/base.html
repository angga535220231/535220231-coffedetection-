<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Analisis Kualitas Biji Kopi{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            colors: {
              espresso: "#2f211b",
              sand: "#f6f1eb",
              moss: "#3d7f63",
              caramel: "#b67043",
              chestnut: "#7f4d35",
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    {% block head_extra %}{% endblock %}
  </head>
  <body class="min-h-screen bg-sand font-display text-espresso">
    <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_10%_15%,#eadbcf_0%,transparent_30%),radial-gradient(circle_at_90%_10%,#f1e7dc_0%,transparent_33%),radial-gradient(circle_at_50%_100%,#dbc5b3_0%,transparent_40%)]"></div>

    {% include "partials/header.html" %}

    <main class="mx-auto w-full max-w-7xl px-4 py-6 md:px-8 md:py-8">
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
